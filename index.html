<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Image</title>
    <style>
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(90deg, #ff4d4d, #ff8c42, #ffe66d, #6ee7b7, #4da3ff, #8b5cf6);
            background-size: 400% 400%;
            animation: rainbow 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        h1 {
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Useless website to impress NASA and Hackclub</h1>
        <img src="https://www.pngmart.com/files/3/NASA-PNG-File.png" alt="Hackclub Image">
        <img src="https://kiit.hackclub.com/static/media/logo.90c2d5da.png" alt="Hackclub Image">
    </div>
</body>
</html>
